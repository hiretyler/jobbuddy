<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JobBuddy</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <div class="brand">JobBuddy</div>
      <nav class="actions">
        <button id="tab-inbox" class="navbtn is-active" type="button">Inbox</button>
        <button id="tab-discover" class="navbtn" type="button">Discover</button>
        <button id="scan-btn" class="navbtn" type="button">Scan inbox</button>
        <a class="navbtn" href="https://docs.google.com/spreadsheets/d/1DKR4dAEnb_WddMlw_xGucqwG6nt6_l83Vt5SdTWh_BI" target="_blank" rel="noopener">Open tracker</a>
        <div class="menu">
          <button id="resumes-btn" class="navbtn" type="button" aria-haspopup="true" aria-expanded="false">Canonical resumes</button>
          <div id="resumes-menu" class="menu-pop" hidden>
            <a href="/api/resume/persona/variant1" target="_blank" rel="noopener">Resume - Enablement &amp; L&amp;D</a>
            <a href="/api/resume/persona/variant2" target="_blank" rel="noopener">Resume - Customer Education</a>
            <a href="/api/cover-letter/persona/variant1" target="_blank" rel="noopener">Cover letter - Enablement &amp; L&amp;D</a>
            <a href="/api/cover-letter/persona/variant2" target="_blank" rel="noopener">Cover letter - Customer Education</a>
          </div>
        </div>
      </nav>
    </div>
  </header>

  <main class="page">
    <!-- CAPTURE -->
    <section class="capture">
      <label class="capture-label" for="paste-url">Paste a job URL</label>
      <form id="capture-form" class="capture-row" autocomplete="off">
        <input id="paste-url" class="capture-input" type="url" inputmode="url"
               placeholder="https://..." aria-label="Job URL" />
        <button id="capture-btn" class="btn-primary" type="submit">Add</button>
      </form>
      <p id="capture-note" class="note" hidden></p>
    </section>

    <!-- INBOX -->
    <section id="view-inbox" class="view">
      <div id="inbox-empty" class="empty" hidden>Nothing in your inbox yet. Paste a URL above to start.</div>
      <div id="inbox-list" class="stack"></div>
      <div id="applied-wrap" class="applied-wrap" hidden>
        <h2 class="section-head">Applied</h2>
        <div id="applied-list" class="stack stack-muted"></div>
      </div>
    </section>

    <!-- DISCOVER -->
    <section id="view-discover" class="view" hidden>
      <form id="discover-form" class="discover-bar" autocomplete="off">
        <select id="discover-source" class="select" aria-label="Source">
          <option value="remotive">Remotive</option>
          <option value="himalayas">Himalayas</option>
          <option value="remoteok">Remote OK</option>
          <option value="wwr">We Work Remotely</option>
        </select>
        <input id="discover-q" class="capture-input" type="text" placeholder="Keyword (optional)" aria-label="Keyword" />
        <button class="btn-primary" type="submit">Browse</button>
      </form>
      <div id="discover-status" class="note" hidden></div>
      <div id="discover-list" class="stack"></div>
    </section>
  </main>

  <div id="toast" class="toast" hidden></div>

  <script src="/app.js"></script>
</body>
</html>
